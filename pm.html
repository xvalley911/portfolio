<!DOCTYPE html>
<html lang="en">
<head>
    <style>body{
        background: lightgray;
    }</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management</title>
</head>
<body>
    <h1 align="center">Project Management</h1>
    <table width="400" border="2" align="center"><form>
        <thead>

        </thead>
        <tbody>
            <tr>
                <th width="125" height="35">Project Name</th>
            </tr>
            <tr>
                <td align="center" height="35">Project Name</td>
                <td align="center">
                    <input type="text" placeholder="project name">
                </td>
            </tr>
            <tr>
                <th align="center" height="35">Asigned To</th>
            </tr>
            <tr>
                <td align="center" height="35">Asigned To</td>
                <td align="center">
                    <input type="text" placeholder="Lorem, ipsum, dolor.">
                </td>
            </tr>
            <tr>
                <th align="center" height="35">Start Date</th>
            </tr>
            <tr>
                <td align="center" height="35">Start Date</td>
                <td align="center" height="35">
                    <input type="date">
                </td>
            </tr>
            <tr>
                <th align="center" height="35">End Date</th>
            </tr>
            <tr>
                <td align="center" height="35">End Date</td>
                <td align="center" height="35">
                    <input type="date">
                </td>
            </tr>
            <tr>
                <th align="center" height="35">Priority</th>
            </tr>
            <tr>
                <td align="center" height="35">Priority</td>
                <td align="center">
                    <input name="Priority" type="radio" value="High">
                    <label for="High">High</label>
                    <input name="Priority" type="radio" value="Average">
                    <label for="Average">Average</label>
                    <input name="Priority" type="radio" value="Low">
                    <label for="Low">Low</label>
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td align="center">
                    <input type="submit" value="submit">
                </td>
                <th>
                    <input name="Priority" type="reset" value="clear">
                </th>
            </tr>
        </tfoot>
    </table></form>
</body>
</html>
